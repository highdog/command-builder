<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I-Codesign</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --text: #1f2937;
      --muted: #4b5563;
      --brand: #0f766e;
      --card: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top right, #dbeafe, var(--bg) 55%);
      color: var(--text);
    }
    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 48px 20px 64px;
    }
    .hero {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 28px;
      align-items: center;
    }
    .card {
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      padding: 28px;
    }
    h1 {
      font-size: 40px;
      margin: 0 0 12px;
      line-height: 1.2;
    }
    p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.7;
    }
    .btn {
      display: inline-block;
      padding: 12px 20px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      background: var(--brand);
      color: #fff;
    }
    .preview {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 14px;
      min-height: 320px;
    }
    @media (max-width: 860px) {
      .hero { grid-template-columns: 1fr; }
      h1 { font-size: 32px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <article class="card">
        <h1>I-Codesign</h1>
        <p>我们专注于智能硬件与软件系统协同设计，覆盖从协议、控制链路到产品落地的全流程工程能力。</p>
        <p>需要进入蓝牙命令平台，请点击下方入口。</p>
        <a class="btn" href="/btcommand">进入 BT Command 平台</a>
      </article>
      <div class="card">
        <img class="preview" src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=1400&q=80" alt="Company banner">
      </div>
    </section>
  </main>
</body>
</html>
